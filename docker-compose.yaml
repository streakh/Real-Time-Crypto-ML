services:

  # ---- Kafka (KRaft, no Zookeeper) ----
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,INTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://kafka:29092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    volumes:
      - kafka-data:/var/lib/kafka/data
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10

  # ---- One-shot: create Kafka topics ----
  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic ticks.raw      --partitions 1 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic ticks.features --partitions 1 --replication-factor 1
      echo 'Topics created.'
      "
    restart: "no"

  # ---- MLflow tracking server ----
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.12.2
    container_name: mlflow
    ports:
      - "5001:5000"
    command: >
      mlflow server
      --backend-store-uri sqlite:////mlruns/mlflow_ui.db
      --default-artifact-root /mlruns/artifacts
      --host 0.0.0.0
      --port 5000
    volumes:
      - mlflow-data:/mlruns
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

  # ---- FastAPI prediction service ----
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: api
    ports:
      - "8000:8000"
    environment:
      MODEL_PATH: models/artifacts/lr_pipeline.pkl
      MODEL_VERSION: v1.0
      MODEL_VARIANT: ${MODEL_VARIANT:-ml}
      BASELINE_VOL_THRESHOLD: ${BASELINE_VOL_THRESHOLD:-0.000048}
    depends_on:
      kafka:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: on-failure

  # ---- Replay ingestor: NDJSON sample → Kafka ticks.raw ----
  ingestor:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    container_name: ingestor
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP: kafka:29092
      TOPIC_RAW: ticks.raw
    volumes:
      - ./handoff/data_sample:/app/data_sample:ro
    command:
      - python
      - -u
      - scripts/replay_to_kafka.py
      - --file
      - /app/data_sample/raw_slice.ndjson
      - --loop
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    restart: on-failure

  # ---- Featurizer: ticks.raw → ticks.features + Parquet ----
  featurizer:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    container_name: featurizer
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP: kafka:29092
    volumes:
      - ./data:/app/data
    command:
      - python
      - -u
      - features/featurizer.py
      - --config
      - /app/config.yaml
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    restart: on-failure

  # ---- Kafka exporter (consumer-group lag → Prometheus) ----
  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.7.0
    container_name: kafka-exporter
    command: ["--kafka.server=kafka:29092"]
    depends_on:
      kafka:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    restart: on-failure

  # ---- Prometheus ----
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    restart: on-failure

  # ---- Grafana ----
  grafana:
    image: grafana/grafana:11.2.0
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    restart: on-failure

volumes:
  kafka-data:
  mlflow-data:
  prometheus-data:
  grafana-data:
