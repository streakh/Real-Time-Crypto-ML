global:
  scrape_interval: 5s
  evaluation_interval: 15s

scrape_configs:
  - job_name: api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]

  # Kafka exporter surfaces lag for both replay runtime hops:
  # ticks.raw -> ticks-featurizer and ticks.features -> predict-bridge.
  - job_name: kafka-exporter
    static_configs:
      - targets: ["kafka-exporter:9308"]
